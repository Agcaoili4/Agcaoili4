name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 🌙 Dark snake
      - name: Generate dark snake
        uses: Platane/snk@v3
        with:
          github_user_name: Agcaoili4
          outputs: dist/snake-dark.svg
          palette: github-dark

      # ⚡ Neon snake
      - name: Generate neon snake
        uses: Platane/snk@v3
        with:
          github_user_name: Agcaoili4
          outputs: dist/snake-neon.svg
          color_snake: "#00f0ff"
          color_dots: "#0d1117,#003f5c,#2f4b7c,#665191,#a05195"

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist
